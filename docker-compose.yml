name: saqbol

services:
  postgres:
    image: postgres:16-alpine
    container_name: saqbol-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-saqbol}
      POSTGRES_USER: ${POSTGRES_USER:-saqbol_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-saqbol_password}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - saqbol-data

  redis:
    image: redis:7.2-alpine
    container_name: saqbol-redis
    restart: unless-stopped
    command: /bin/sh -c "redis-server --appendonly yes --requirepass '$${REDIS_PASSWORD:-saqbol_redis_password}'"
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-saqbol_redis_password}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep PONG >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - saqbol-data

  api:
    image: saqbol/api:local
    container_name: saqbol-api
    build:
      context: .
      dockerfile: infrastructure/docker/api.Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      APP_ENV: ${APP_ENV:-local}
      PORT: 4000
      API_URL: http://api:4000/api/v1
      DATABASE_URL: postgresql://${POSTGRES_USER:-saqbol_app}:${POSTGRES_PASSWORD:-saqbol_password}@postgres:5432/${POSTGRES_DB:-saqbol}?schema=public
      REDIS_URL: redis://:${REDIS_PASSWORD:-saqbol_redis_password}@redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-local_access_secret_change_me_64_chars_minimum_1234567890}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-local_refresh_secret_change_me_64_chars_minimum_1234567890}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-15m}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-30d}
      API_CORS_ORIGINS: ${DOCKER_API_CORS_ORIGINS:-http://localhost,http://localhost:3000,http://localhost:3001}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      UPLOADS_ROOT: ${UPLOADS_ROOT:-/uploads}
      EXPORTS_ROOT: ${EXPORTS_ROOT:-/exports}
    ports:
      - "${API_PORT:-4000}:4000"
    volumes:
      - uploads_data:/uploads
      - exports_data:/exports
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:4000/api/v1/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - saqbol-app
      - saqbol-data

  public-web:
    image: saqbol/public-web:local
    container_name: saqbol-public-web
    build:
      context: .
      dockerfile: infrastructure/docker/public-web.Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${DOCKER_NEXT_PUBLIC_API_URL:-http://localhost:4000/api/v1}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_API_URL: ${DOCKER_NEXT_PUBLIC_API_URL:-http://localhost:4000/api/v1}
      NEXT_PUBLIC_API_BASE_URL: ${DOCKER_NEXT_PUBLIC_API_URL:-http://localhost:4000/api/v1}
    ports:
      - "${PUBLIC_WEB_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - saqbol-app

  workspace-web:
    image: saqbol/workspace-web:local
    container_name: saqbol-workspace-web
    build:
      context: .
      dockerfile: infrastructure/docker/workspace-web.Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${DOCKER_NEXT_PUBLIC_API_URL:-http://localhost:4000/api/v1}
        NEXT_PUBLIC_WORKSPACE_BASE_PATH: ${NEXT_PUBLIC_WORKSPACE_BASE_PATH:-/workspace}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      HOSTNAME: 0.0.0.0
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_API_URL: ${DOCKER_NEXT_PUBLIC_API_URL:-http://localhost:4000/api/v1}
      NEXT_PUBLIC_API_BASE_URL: ${DOCKER_NEXT_PUBLIC_API_URL:-http://localhost:4000/api/v1}
      NEXT_PUBLIC_WORKSPACE_BASE_PATH: ${NEXT_PUBLIC_WORKSPACE_BASE_PATH:-/workspace}
    ports:
      - "${WORKSPACE_WEB_PORT:-3001}:3001"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3001/workspace/login').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - saqbol-app

  ai-service:
    image: saqbol/ai-service:local
    container_name: saqbol-ai-service
    profiles: ["ai-service"]
    build:
      context: .
      dockerfile: infrastructure/docker/ai-service.Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3002
    ports:
      - "3002:3002"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3002/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - saqbol-app

  nginx:
    image: nginx:1.27-alpine
    container_name: saqbol-nginx
    restart: unless-stopped
    depends_on:
      public-web:
        condition: service_healthy
      workspace-web:
        condition: service_healthy
      api:
        condition: service_healthy
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - uploads_data:/uploads:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/healthz >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - saqbol-app

  migrate:
    image: saqbol/api:local
    container_name: saqbol-migrate
    profiles: ["ops"]
    build:
      context: .
      dockerfile: infrastructure/docker/api.Dockerfile
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-saqbol_app}:${POSTGRES_PASSWORD:-saqbol_password}@postgres:5432/${POSTGRES_DB:-saqbol}?schema=public
    command: ["corepack", "pnpm", "--filter", "@saqbol/db", "exec", "prisma", "db", "push", "--schema", "./prisma/schema.prisma"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - saqbol-data

  seed:
    image: saqbol/api:local
    container_name: saqbol-seed
    profiles: ["ops"]
    build:
      context: .
      dockerfile: infrastructure/docker/api.Dockerfile
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-saqbol_app}:${POSTGRES_PASSWORD:-saqbol_password}@postgres:5432/${POSTGRES_DB:-saqbol}?schema=public
    command: ["corepack", "pnpm", "--filter", "@saqbol/db", "exec", "tsx", "./prisma/seed.ts"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - saqbol-data

networks:
  saqbol-app:
    driver: bridge
  saqbol-data:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  uploads_data:
  exports_data:
